<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round">
  <!-- Back wall vertical lines -->
  <line x1="8" y1="4" x2="8" y2="28"/>
  <line x1="16" y1="4" x2="16" y2="28"/>
  <line x1="24" y1="4" x2="24" y2="28"/>
  <line x1="32" y1="4" x2="32" y2="28"/>
  <line x1="40" y1="4" x2="40" y2="28"/>
  <line x1="48" y1="4" x2="48" y2="28"/>
  <line x1="56" y1="4" x2="56" y2="28"/>

  <!-- Back wall horizontal lines -->
  <line x1="4" y1="10" x2="60" y2="10"/>
  <line x1="4" y1="16" x2="60" y2="16"/>
  <line x1="4" y1="22" x2="60" y2="22"/>

  <!-- Horizon / transition line where wall meets floor -->
  <line x1="0" y1="28" x2="64" y2="28"/>

  <!-- Floor lines fanning out from each wall vertical, vanishing point at x=28 -->
  <line x1="8" y1="28" x2="-45" y2="64"/>
  <line x1="16" y1="28" x2="-16" y2="64"/>
  <line x1="24" y1="28" x2="13" y2="64"/>
  <line x1="32" y1="28" x2="43" y2="64"/>
  <line x1="40" y1="28" x2="72" y2="64"/>
  <line x1="48" y1="28" x2="101" y2="64"/>
  <line x1="56" y1="28" x2="130" y2="64"/>

  <!-- Horizontal floor lines, graduated spacing (closer near horizon) -->
  <line x1="0" y1="31" x2="64" y2="31"/>
  <line x1="0" y1="35" x2="64" y2="35"/>
  <line x1="0" y1="40" x2="64" y2="40"/>
  <line x1="0" y1="47" x2="64" y2="47"/>
  <line x1="0" y1="56" x2="64" y2="56"/>
</svg>
